<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <title>Console Shim Test</title>
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module">
      import addConsoleSink from "./console.mjs";

      // Example sink: mirror console output into the page.
      const output = document.createElement("div");
      output.id = "console";
      document.body.appendChild(output);
      addConsoleSink((level, message) => {
        const p = document.createElement("p");
        p.className = level;
        p.appendChild(document.createTextNode(message));
        output.appendChild(p);
      });

      window.addEventListener("load", () => {
        let b = true
        let f = 1234.56789
        let i = 123
        let s = "foo"

        let a = ["a", "b", "c", b, f, i, s]
        let a2 = ["a", "b", "c", ["foo", "bar", "baz"]]
        let a3 = [1,2,3,4,5,Number.NaN,undefined,,9]
        let a4 = [];
        a4[10] = "Holes now exist";
        a4.length = 50

        let o = {a:a, b:b, f:f, i:i, s:s}
        let o2 = { name:"a", reference:null }
        let o3 = { name:"b", reference:o2 }
        o2.reference = o3
        let o4 = { a:o2, b:o3 }

        let tests = [
          [{ a:undefined, b:Number.NaN, c:null, d:false, e: true }],

          ["%s", a2],
          ["%d", a2],
          ["%f", a2],
          ["%o", a2],

          ["%20.2i", i],
          ["%20.2f", -f],
          ["%20.2f", f],

          ["%.2i", f],
          ["%.2d", f],
          ["%.2f", f],

          ["%10i", i],
          ["%10f", -f],
          ["%10f", f],

          ["%s is %d years old.", "Bob", 42],

          ["string: %s, integer: %10.5i, object: %o, float: %.2f ......."],
          ["string: %s, integer: %10.5i, object: %o, float: %.2f .......", s, i, o, f, f, f],
          ["foo", "bar", "baz", "bum"],

          [b, i, f, a, o, "bar", "baz", "bum"],
          ["string: %s, integer: %10.5i, object: %o, float: %.2f"],

          [a],
          [a.toString()],
          [a2],
          [a3],
          [a4],

          [o],
          [o.toString()],
          [o2],
          [o3],
          [o4],

          [false],
          [undefined],
          [""],
          [],
        ]

        let count = 0
        for (let test of tests) {
          console.info(">>> Test %d", ++count)
          console.log(...test)
          console.log("\n")
        }

        console.warn("This is a %s!", "warning")

        console.assert(true, "Test assert error message: %d", 0)
        console.assert(false)
        console.assert(false, "Test assert error message: %d", -10)

        console.error("THIS IS AN ERROR!")
        console.error("THIS IS A SECOND ERROR!")

        // Uncaught errors and unhandled promise rejections are captured too.
        Promise.reject(new Error("Unhandled rejection test"))
        setTimeout(() => { throw new Error("Uncaught error test") })
      });
    </script>
    <style>
      body { background-color: #111; color: #ccc; margin: 32px; }
      #console { font-family: Menlo, Monaco, monospace; white-space: pre-wrap; }
      #console p { margin: 0 0 .5em; }
      #console .debug { color: #789; }
      #console .info { color: #8ac; }
      #console .warn { color: #db7; }
      #console .error { color: #e77; }
    </style>
  </head>
  <body></body>
</html>
